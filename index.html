<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Environment Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#0f172a; color:white; font-family:Arial, sans-serif; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; margin:15px auto; max-width:500px; border-radius:20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .value { font-size:42px; font-weight:bold; color: #38bdf8; }
        .status { font-size: 18px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🌍 Smart Environment</h1>
    <div class="card">
        <h2>Temperature</h2>
        <div id="temp" class="value">🌡 -- °C</div>
    </div>
    <div class="card">
        <h2>Humidity</h2>
        <div id="hum" class="value">💧 -- %</div>
    </div>
    <div class="card">
        <div id="status" class="status">⏳ Connecting to Cloud...</div>
    </div>
    <div class="card"><canvas id="tempChart"></canvas></div>

    <script>
        // ใส่ URL ของ Google Apps Script ของคุณที่นี่
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKQAPzEOXZkVf2ZMB2IqFK2jiqbUQXxf1hMPC9wZTxJ5vs5BY-b7rx6ze3fQSnaNiA/exec";

        const labels = [];
        const tempData = [];
        const tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Temp History', data: tempData, borderColor: '#38bdf8', tension: 0.3 }] },
            options: { responsive: true }
        });

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                document.getElementById("temp").innerHTML = "🌡 " + parseFloat(data.temp).toFixed(1) + " °C";
                document.getElementById("hum").innerHTML = "💧 " + parseFloat(data.hum).toFixed(1) + " %";
                document.getElementById("status").innerHTML = "🟢 Online (Cloud Mode)";
                
                labels.push(new Date().toLocaleTimeString());
                tempData.push(data.temp);
                if(labels.length > 20) { labels.shift(); tempData.shift(); }
                tempChart.update();
            } catch(err) {
                document.getElementById("status").innerHTML = "🔴 Offline (Cannot connect)";
            }
        }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
