<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Smart Environment Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.45);
            --text-color: #0f172a;
            --text-muted: #475569;
            --border-color: rgba(255, 255, 255, 0.6);
            --astro-bg: rgba(255, 255, 255, 0.4);
            --icon-halo: rgba(255, 255, 255, 0.3);
        }
        body.dark-mode {
            --card-bg: rgba(15, 23, 42, 0.65);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.15);
            --astro-bg: rgba(0, 0, 0, 0.4);
            --icon-halo: rgba(0, 0, 0, 0.4);
        }

        body { 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 12px; 
            margin: 0;
            overflow-x: hidden;
            transition: color 0.4s ease;
            min-height: 100vh;
        }

        .bg-layer {
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: opacity 0.8s ease-in-out;
            will-change: transform;
            animation: panBackground 20s infinite alternate linear;
        }
        .bg-ocean {
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
            opacity: 1;
        }
        .bg-forest {
            background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1600&q=80');
            opacity: 0;
            z-index: -1;
        }
        body.dark-mode .bg-ocean { opacity: 0; }
        body.dark-mode .bg-forest { opacity: 1; }

        @keyframes panBackground {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(3%, 3%); }
        }
        
        .container { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
        
        .card { 
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            padding: 16px; 
            margin: 10px auto; 
            border-radius: 24px; 
            box-shadow: 0 6px 24px rgba(0,0,0,0.08); 
            box-sizing: border-box;
            transition: background 0.4s ease, border 0.4s ease;
        }
        
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .sensor-grid .card { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 14px 10px; }
        
        .value { font-size: 28px; font-weight: 800; color: #0284c7; margin: 6px 0; letter-spacing: -0.5px; }
        body.dark-mode .value { color: #38bdf8; }
        .hum-value { color: #059669 !important; }
        body.dark-mode .hum-value { color: #10b981 !important; }
        
        .time-box { font-size: 2.2rem; font-weight: bold; padding: 2px; color: #0284c7; font-family: monospace; }
        body.dark-mode .time-box { color: #38bdf8; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .theme-switch-wrapper { display: flex; align-items: center; gap: 6px; }
        .theme-text { font-size: 12px; font-weight: bold; }
        .theme-switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #38bdf8; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #0f172a; }
        input:checked + .slider:before { transform: translateX(20px); }

        .unit-btn { background: #38bdf8; color: white; border: none; padding: 5px 12px; font-size: 12px; font-weight: bold; border-radius: 15px; cursor: pointer; }

        .astro-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px; }
        
        .icon-box {
            width: 70px; height: 70px; 
            border-radius: 50%;
            background: var(--icon-halo);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }

        .sun { 
            width: 48px; height: 48px; 
            border-radius: 50%; 
            background: #fbbf24; 
            box-shadow: 0 0 25px 8px rgba(251, 191, 36, 0.7); 
            animation: sunPulse 2s infinite alternate ease-in-out; 
            display: block;
        }
        @keyframes sunPulse { 0% { transform: scale(1); box-shadow: 0 0 20px 5px rgba(251, 191, 36, 0.6); } 100% { transform: scale(1.08); box-shadow: 0 0 35px 12px rgba(251, 191, 36, 0.9); } }
        
        .moon { 
            font-size: 48px; 
            line-height: 1;
            filter: drop-shadow(0 0 15px rgba(248, 250, 252, 0.8)); 
            animation: moonPulse 3s infinite alternate ease-in-out;
            display: none;
            user-select: none;
        }
        body.dark-mode .moon { display: block; }
        body.dark-mode .sun { display: none; }

        @keyframes moonPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(248, 250, 252, 0.5)); } 100% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(248, 250, 252, 1)); } }

        .astro-info { 
            background: var(--astro-bg); 
            padding: 6px 14px; 
            border-radius: 12px; 
            text-align: left; 
            font-size: 11px; 
            color: var(--text-muted); 
            line-height: 1.4; 
            border: 1px solid var(--border-color); 
            width: max-content; 
            transition: background 0.4s ease;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: 8px; width: 100%; border-top: 1px dashed var(--border-color); padding-top: 6px;}
        .stat-box { font-size: 11px; font-weight: 600; }
        .stat-label { color: var(--text-muted); font-size: 9px; font-weight: bold; }
        
        .chart-container { position: relative; width: 100%; height: 140px; margin-top: 5px; }
        h2.main-title { font-size: 22px; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); margin: 15px 0 2px 0; }
        p.sub-title { color: #f1f5f9; text-shadow: 0 1px 6px rgba(0,0,0,0.5); margin: 0 0 12px 0; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg-layer bg-ocean"></div>
    <div class="bg-layer bg-forest"></div>

    <div class="container">
        <div class="card">
            <div class="astro-container">
                <div class="icon-box">
                    <div id="sun-icon" class="sun"></div>
                    <div id="moon-icon" class="moon">🌕</div>
                </div>
                <div id="astro-info" class="astro-info"></div>
            </div>
            
            <div id="clock" class="time-box">00:00:00</div>
            
            <div class="controls-row">
                <div class="theme-switch-wrapper">
                    <span id="theme-text" class="theme-text">Light Mode</span>
                    <label class="theme-switch" for="theme-checkbox">
                        <input type="checkbox" id="theme-checkbox" />
                        <div class="slider"></div>
                    </label>
                </div>
                <button id="unit-btn" class="unit-btn" onclick="toggleUnit()">สลับหน่วย (°F)</button>
            </div>
        </div>

        <h2 class="main-title">🌍 Smart Environment</h2>
        <p class="sub-title">Environmental Monitoring System</p>

        <div class="sensor-grid">
            <div class="card">
                <span style="font-size: 12px; font-weight: bold; color: var(--text-muted);">Temperature</span>
                <div id="temp" class="value">🌡 --°C</div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-label">MIN</div><span id="t-min">--</span></div>
                    <div class="stat-box"><div class="stat-label">AVG</div><span id="t-avg">--</span></div>
                    <div class="stat-box"><div class="stat-label">MAX</div><span id="t-max">--</span></div>
                </div>
            </div>
            <div class="card">
                <span style="font-size: 12px; font-weight: bold; color: var(--text-muted);">Humidity</span>
                <div id="hum" class="value hum-value" style="margin-top: 15px;">💧 --%</div>
                <span style="font-size: 10px; color: var(--text-muted); margin-top: auto; padding-top: 10px;">DHT22 Sensor</span>
            </div>
        </div>

        <div class="card">
            <span style="font-size:12px; font-weight: bold; color: var(--text-muted); display:block;">Temperature History</span>
            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
            
            <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 15px 0 10px 0;">
            
            <span style="font-size:12px; font-weight: bold; color: var(--text-muted); display:block;">Humidity History</span>
            <div class="chart-container">
                <canvas id="humChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentCelsius = 0;
        let globalHistory = [];
        let currentUnit = "C";

        // ฟังก์ชันคำนวณข้างขึ้น-ข้างแรมตามดาราศาสตร์ (Moon Phase Calculator)
        function getMoonPhase() {
            const date = new Date();
            let year = date.getFullYear();
            let month = date.getMonth() + 1;
            let day = date.getDate();
            
            if (month < 3) { year--; month += 12; }
            month++;
            
            let jd = (365.25 * year) + (30.6 * month) + day - 694039.09;
            jd /= 29.5305882; 
            let phaseValue = Math.round((jd - parseInt(jd)) * 8);
            if (phaseValue >= 8) phaseValue = 0;

            const phases = [
                { name: "แรม 15 ค่ำ (New Moon)", icon: "🌑" },
                { name: "ข้างขึ้น (Waxing Crescent)", icon: "🌒" },
                { name: "ขึ้น 8 ค่ำ (First Quarter)", icon: "🌓" },
                { name: "ข้างขึ้น (Waxing Gibbous)", icon: "🌔" },
                { name: "ขึ้น 15 ค่ำ (Full Moon)", icon: "🌕" },
                { name: "ข้างแรม (Waning Gibbous)", icon: "🌖" },
                { name: "แรม 8 ค่ำ (Last Quarter)", icon: "🌗" },
                { name: "ข้างแรม (Waning Crescent)", icon: "🌘" }
            ];
            return phases[phaseValue];
        }

        const toggleSwitch = document.getElementById('theme-checkbox');
        const themeText = document.getElementById('theme-text');
        
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark-mode') {
            document.body.classList.add('dark-mode');
            toggleSwitch.checked = true;
        }

        function applyThemeElements() {
            const isDark = document.body.classList.contains('dark-mode');
            const astroInfo = document.getElementById('astro-info');
            const moonIcon = document.getElementById('moon-icon');

            if (isDark) {
                themeText.innerText = 'Dark Mode';
                const currentMoon = getMoonPhase();
                moonIcon.innerText = currentMoon.icon;
                astroInfo.innerHTML = `<strong>🌙 Amnat Forest Night</strong><br>เฟส: ${currentMoon.name}<br>Mode: Eco Active`;
            } else {
                themeText.innerText = 'Light Mode';
                astroInfo.innerHTML = `<strong>☀️ Amnat Ocean Day</strong><br>Rise: 05:42 | Set: 18:28<br>Mode: Standard`;
            }
            updateChartTheme();
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light-mode');
            }
            applyThemeElements();
        }
        toggleSwitch.addEventListener('change', switchTheme, false);

        function cToF(celsius) { return (celsius * 9/5) + 32; }

        function toggleUnit() {
            currentUnit = (currentUnit === "C") ? "F" : "C";
            document.getElementById("unit-btn").innerText = `สลับหน่วย (°${currentUnit === "C" ? "F" : "C"})`;
            renderChartsData();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
        applyThemeElements(); 

        // อัปเดตลิงก์ Google Apps Script ตัวใหม่ของจริงเรียบร้อยครับ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE_Qd2nqubnmY-6reYWQOaSC4vfmbzoEfkpJApy_7NHU4qphDtYbnk2hDV4ysVtHy0/exec";

        const labels = [];
        const tempData = [];
        const humData = []; 

        const tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Temp', data: tempData, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.15)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: '#475569', font: { size: 9 } }, grid: { display: false } }, y: { ticks: { color: '#475569', font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.06)' } } }, plugins: { legend: { display: false } } }
        });

        const humChart = new Chart(document.getElementById('humChart'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Humidity', data: humData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.15)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: '#475569', font: { size: 9 } }, grid: { display: false } }, y: { ticks: { color: '#475569', font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.06)' } } }, plugins: { legend: { display: false } } }
        });

        function updateChartTheme() {
            if (!tempChart || !tempChart.options) return;
            const isDark = document.body.classList.contains('dark-mode');
            const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
            const textColor = isDark ? '#94a3b8' : '#475569';
            
            [tempChart, humChart].forEach(chart => {
                if (chart.options.scales && chart.options.scales.y) {
                    chart.options.scales.y.grid.color = gridColor;
                    chart.options.scales.x.ticks.color = textColor;
                    chart.options.scales.y.ticks.color = textColor;
                    chart.update({ duration: 0 });
                }
            });
        }

        function renderChartsData() {
            if (!globalHistory || globalHistory.length === 0) return;

            let displayTemp = (currentUnit === "C") ? currentCelsius : cToF(currentCelsius);
            document.getElementById("temp").innerHTML = `🌡 ${displayTemp.toFixed(1)}°${currentUnit}`;

            labels.length = 0; tempData.length = 0; humData.length = 0;
            let totalTemp = 0; let maxTemp = -999; let minTemp = 999;

            globalHistory.forEach(item => {
                labels.push(item.time);
                
                let tCelsius = parseFloat(item.temp);
                let tDisplay = (currentUnit === "C") ? tCelsius : cToF(tCelsius);
                tempData.push(tDisplay);
                totalTemp += tDisplay;
                if (tDisplay > maxTemp) maxTemp = tDisplay;
                if (tDisplay < minTemp) minTemp = tDisplay;

                humData.push(parseFloat(item.hum));
            });

            document.getElementById("t-max").innerText = `${maxTemp.toFixed(0)}°`;
            document.getElementById("t-min").innerText = `${minTemp.toFixed(0)}°`;
            document.getElementById("t-avg").innerText = `${(totalTemp / globalHistory.length).toFixed(0)}°`;

            tempChart.update();
            humChart.update();
            updateChartTheme(); 
        }

       async function loadData() {
            try {
                // ดึงข้อมูลจาก Google Sheets พร้อมเปิดโหมด CORS ให้ปลอดภัย
                const response = await fetch(SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                console.log("ได้รับข้อมูลจาก Google Sheets สำเร็จ:", data);

                // ตรวจสอบและดึงค่าวัดอุณหภูมิปัจจุบัน (ยืดหยุ่นตามชื่อตัวแปรที่ส่งมา)
                if (data.temp !== undefined) {
                    currentCelsius = parseFloat(data.temp);
                } else if (data.current && data.current.temp !== undefined) {
                    currentCelsius = parseFloat(data.current.temp);
                } else {
                    currentCelsius = 0;
                }

                // ตรวจสอบและดึงค่าวัดความชื้นปัจจุบัน
                let curHum = 0;
                if (data.humidity !== undefined) {
                    curHum = parseFloat(data.humidity);
                } else if (data.hum !== undefined) {
                    curHum = parseFloat(data.hum);
                } else if (data.current && data.current.hum !== undefined) {
                    curHum = parseFloat(data.current.hum);
                }
                document.getElementById("hum").innerHTML = "💧 " + curHum.toFixed(1) + "%";

                // จัดการเรื่องกราฟประวัติย้อนหลัง (History)
                if (data.history && data.history.length > 0) {
                    globalHistory = data.history;
                } else {
                    // หาก Google Script ยังไม่ส่งประวัติมา ให้สร้างจุดเวลาปัจจุบันขึ้นมา 1 จุดเพื่อให้กราฟไม่พัง
                    const now = new Date();
                    const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    globalHistory = [{ time: timeString, temp: currentCelsius, hum: curHum }];
                }

                // สั่งประมวลผลวาดกราฟและอัปเดตตัวเลขสถิติบนหน้าเว็บ
                renderChartsData();

            } catch (err) {
                console.error("การดึงข้อมูลจาก Sheets ล้มเหลว -> สลับไปใช้ค่าจำลอง:", err);
                
                // ระบบ Fallback ข้อมูลจำลองเมื่อเน็ตหลุดหรือข้อมูลผิดพลาด
                currentCelsius = 28.5;
                document.getElementById("hum").innerHTML = "💧 62.0%";
                globalHistory = [
                    { time: "08:00", temp: 24.1, hum: 68 },
                    { time: "09:00", temp: 25.5, hum: 65 },
                    { time: "10:00", temp: 27.2, hum: 60 },
                    { time: "11:00", temp: 28.5, hum: 62 }
                ];
                renderChartsData();
            }
        }
        loadData();
        setInterval(loadData, 10000); 
    </script>
</body>
</html>
