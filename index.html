<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Environment</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
margin:0;
}

.card{
background:#1e293b;
padding:20px;
margin:15px auto;
max-width:500px;
border-radius:20px;
}

.value{
font-size:42px;
font-weight:bold;
}

button{
padding:10px 20px;
margin:5px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
background:white;
border-radius:15px;
}

.status{
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🌍 Smart Environment</h1>

<div class="card">
<h2>Temperature</h2>
<div id="temp" class="value">--</div>
</div>

<div class="card">
<h2>Humidity</h2>
<div id="hum" class="value">--</div>
</div>

<div class="card">
<button onclick="unit='C'">°C</button>
<button onclick="unit='F'">°F</button>
</div>

<div class="card">
<div id="status" class="status">
🟢 Online
</div>
</div>

<div class="card">
<canvas id="tempChart"></canvas>
</div>

<script>

const ARDUINO_IP = "192.168.1.254";

let unit = "C";

const labels = [];
const tempData = [];

const tempChart = new Chart(
document.getElementById('tempChart'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Temperature',
data:tempData
}]
},
options:{
responsive:true
}
}
);

async function loadData(){

try{

const response =
await fetch(
`http://${ARDUINO_IP}/data`
);

const data =
await response.json();

let temp = data.temp;

if(unit==="F"){
temp = (temp * 9/5) + 32;
}

document.getElementById("temp")
.innerHTML =
"🌡 " + temp.toFixed(1) + " " + unit;

document.getElementById("hum")
.innerHTML =
"💧 " + data.hum.toFixed(1) + " %";

document.getElementById("status")
.innerHTML =
"🟢 Online";

labels.push(
new Date().toLocaleTimeString()
);

tempData.push(temp);

if(labels.length > 20){
labels.shift();
tempData.shift();
}

tempChart.update();

}
catch(err){

document.getElementById("status")
.innerHTML =
"🔴 Offline";

console.log(err);

}

}

loadData();

setInterval(loadData,2000);

</script>

</body>
</html>
