<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
</head>
<body>
    <h1>อุณหภูมิ: <span id="temp">--</span> °C</h1>
    <h1>ความชื้น: <span id="hum">--</span> %</h1>

    <script>
        // เปลี่ยน URL นี้เป็น URL ที่ได้จากการกด Deploy ของคุณ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE_Qd2nqubnmY-6reYWQOaSC4vfmbzoEfkpJApy_7NHU4qphDtYbnk2hDV4ysVtHy0/exec";

        async function fetchData() {
            try {
                // ใช้โหมด no-cors หรือ cors ตามที่เซิร์ฟเวอร์ตั้งค่า
                const response = await fetch(SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors' 
                });
                const data = await response.json();
                
                document.getElementById('temp').innerText = data.temp;
                document.getElementById('hum').innerText = data.humidity;
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // อัปเดตข้อมูลทุก 5 วินาที
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
