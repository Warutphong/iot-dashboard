<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #ffffff; }
        .light-mode { --bg-color: #f1f5f9; --card-bg: #ffffff; --text-color: #0f172a; }

        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.5s; padding: 20px; }
        .container { max-width: 600px; margin: auto; text-align: center; }

        /* นาฬิกา */
        .time-box { font-size: 2rem; font-weight: bold; padding: 15px; border-radius: 20px; background: var(--card-bg); margin-bottom: 20px; border: 1px solid #38bdf8; }
        
        /* อนิเมชันพระอาทิตย์/พระจันทร์ */
        .sky-icon { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; transition: 0.5s; }
        .sun { background: #fbbf24; box-shadow: 0 0 20px #fbbf24; animation: pulse 2s infinite; }
        .moon { background: transparent; box-shadow: 15px 15px 0 0 #e2e8f0; }

        .card { background: var(--card-bg); padding: 20px; margin: 10px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div id="sky-icon" class="sky-icon"></div>
            <div id="clock" class="time-box">00:00:00</div>
            <button onclick="document.body.classList.toggle('light-mode')">🌓 สลับโหมด</button>
        </div>
        </div>

    <script>
        function updateDisplay() {
            const now = new Date();
            const hour = now.getHours();
            
            // อัปเดตนาฬิกา
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            
            // อัปเดตอนิเมชัน (กลางวัน 6 โมงเช้า - 6 โมงเย็น)
            const sky = document.getElementById('sky-icon');
            if (hour >= 6 && hour < 18) {
                sky.className = 'sky-icon sun';
            } else {
                sky.className = 'sky-icon moon';
            }
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
