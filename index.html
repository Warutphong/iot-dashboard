<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Environment Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
        }
        .light-mode {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
        }
        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            margin: 15px auto; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            transition: background 0.3s, transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .value { font-size: 46px; font-weight: bold; color: #38bdf8; }
        .status { font-size: 16px; font-weight: bold; }
        button { 
            padding: 10px 20px; 
            font-size: 14px; 
            font-weight: bold;
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            margin: 5px;
            background: #334155; 
            color: white;
            transition: 0.2s;
        }
        button:hover { background: #475569; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; font-size: 14px; }
        .stat-label { color: var(--text-muted); font-size: 12px; }
        .danger-alert {
            background: #ef4444 !important;
            animation: pulse 2s infinite;
        }
        .danger-alert .value, .danger-alert h2 { color: white !important; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        canvas { background: white; border-radius: 15px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: right;">
            <button onclick="toggleTheme()">🌓 สลับโหมด มืด/สว่าง</button>
        </div>

        <h1>🌍 Smart Environment</h1>
        <p style="color: var(--text-muted); margin-top: 0;">ระบบติดตามสภาพแวดล้อมอัจฉริยะ</p>

        <div id="temp-card" class="card">
            <h2 style="margin:0; font-size:18px;">Temperature</h2>
            <div id="temp" class="value">🌡 -- °C</div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">ต่ำสุด</div><span id="t-min">--</span></div>
                <div class="stat-box"><div class="stat-label">เฉลี่ย</div><span id="t-avg">--</span></div>
                <div class="stat-box"><div class="stat-label">สูงสุด</div><span id="t-max">--</span></div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin:0; font-size:18px;">Humidity</h2>
            <div id="hum" class="value" style="color: #10b981;">💧 -- %</div>
        </div>

        <div class="card" style="padding: 12px;">
            <div id="status" class="status">⏳ กำลังดึงข้อมูลประวัติจากระบบ Cloud...</div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size:16px; color: var(--text-muted);">กราฟแสดงแนวโน้มอุณหภูมิย้อนหลัง</h3>
            <canvas id="tempChart"></canvas>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNjRsvgDeIlfuQbTeWS-2OGGteEWqSZ04fhGH3HZeJJIAPMScUumiJISQgPhmLZeWV/exec";

        const labels = [];
        const tempData = [];
        const tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'อุณหภูมิ (°C)',
                    data: tempData,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { responsive: true }
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                const curTemp = parseFloat(data.current.temp);
                const curHum = parseFloat(data.current.hum);

                document.getElementById("temp").innerHTML = "🌡 " + curTemp.toFixed(1) + " °C";
                document.getElementById("hum").innerHTML = "💧 " + curHum.toFixed(1) + " %";
                document.getElementById("status").innerHTML = "🟢 อัปเดตล่าสุดเรียบร้อย (Cloud Mode)";
                document.getElementById("status").style.color = "#10b981";

                const tempCard = document.getElementById("temp-card");
                if (curTemp >= 35.0) {
                    tempCard.classList.add("danger-alert");
                } else {
                    tempCard.classList.remove("danger-alert");
                }

                labels.length = 0; 
                tempData.length = 0;
                
                let totalTemp = 0;
                let maxTemp = -999;
                let minTemp = 999;

                data.history.forEach(item => {
                    labels.push(item.time);
                    tempData.push(item.temp);

                    let t = parseFloat(item.temp);
                    totalTemp += t;
                    if (t > maxTemp) maxTemp = t;
                    if (t < minTemp) minTemp = t;
                });

                document.getElementById("t-max").innerText = maxTemp.toFixed(1) + "°C";
                document.getElementById("t-min").innerText = minTemp.toFixed(1) + "°C";
                document.getElementById("t-avg").innerText = (totalTemp / data.history.length).toFixed(1) + "°C";

                tempChart.update();

            } catch (err) {
                document.getElementById("status").innerHTML = "🔴 เชื่อมต่อฐานข้อมูลล้มเหลว";
                document.getElementById("status").style.color = "#ef4444";
                console.log(err);
            }
        }

        loadData();
        setInterval(loadData, 10000); 
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard Pro</title>
    <style>
        /* กำหนดสีของแต่ละโหมด */
        :root { --bg: #f1f5f9; --text: #0f172a; --card: #ffffff; }
        .dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; transition: 0.5s; 
            text-align: center; padding: 20px; margin: 0; 
        }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }

        /* อนิเมชันท้องฟ้า */
        .sky-icon { width: 80px; height: 80px; border-radius: 50%; margin: 10px auto; transition: 0.5s; }
        .sun { background: #fbbf24; box-shadow: 0 0 20px #fbbf24; animation: pulse 2s infinite; }
        .moon { background: transparent; box-shadow: 15px 15px 0 0 #e2e8f0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* นาฬิกา */
        .clock { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #38bdf8; }
        
        button { 
            padding: 10px 20px; cursor: pointer; border-radius: 10px; border: none; 
            background: #38bdf8; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body class="light-mode">
    <div class="container">
        <div class="card">
            <div id="sky" class="sky-icon sun"></div>
            <div id="clock" class="clock">00:00:00</div>
            <button id="toggle-theme">สลับโหมด สีขาว/ดำ</button>
        </div>
        
        <div class="card">
            <h1>ข้อมูลเซนเซอร์</h1>
            <p>ยินดีต้อนรับสู่ระบบติดตามข้อมูลอัจฉริยะ</p>
        </div>
    </div>

    <script>
        // 1. จัดการเรื่องโหมดสี (Dark/Light)
        const body = document.body;
        const btn = document.getElementById('toggle-theme');
        const savedTheme = localStorage.getItem('theme') || 'light-mode';
        body.className = savedTheme;

        btn.addEventListener('click', () => {
            const isDark = body.classList.toggle('dark-mode');
            body.classList.toggle('light-mode');
            localStorage.setItem('theme', isDark ? 'dark-mode' : 'light-mode');
        });

        // 2. ฟังก์ชันนาฬิกา + อนิเมชันพระอาทิตย์/พระจันทร์
        function updateDisplay() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            
            const hour = now.getHours();
            const sky = document.getElementById('sky');
            
            // ช่วงเวลา 6:00 - 18:00 เป็นกลางวัน
            if (hour >= 6 && hour < 18) {
                sky.className = 'sky-icon sun';
            } else {
                sky.className = 'sky-icon moon';
            }
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
