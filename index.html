<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Environment</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px auto;
max-width:450px;
border-radius:20px;
}

.value{
font-size:42px;
font-weight:bold;
}

button{
padding:10px 20px;
font-size:18px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
background:white;
border-radius:15px;
}

</style>
</head>

<body>

<h1>🌍 Smart Environment</h1>

<div class="card">
<h2>Temperature</h2>
<div id="temp" class="value">--</div>
</div>

<div class="card">
<h2>Humidity</h2>
<div id="hum" class="value">--</div>
</div>

<div class="card">
<button onclick="unit='C'">°C</button>
<button onclick="unit='F'">°F</button>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>

let unit='C';

const labels=[];
const temps=[];

const chart=new Chart(
document.getElementById('chart'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Temperature',
data:temps
}]
}
}
);

async function loadData(){

const response=
await fetch(
'http://192.168.1.254/data'
);

const data=
await response.json();

let t=data.temp;

if(unit==='F'){
t=(t*9/5)+32;
}

document.getElementById('temp')
.innerHTML='🌡 '+t.toFixed(1)+' '+unit;

document.getElementById('hum')
.innerHTML='💧 '+data.hum.toFixed(1)+' %';

labels.push(
new Date().toLocaleTimeString()
);

temps.push(t);

if(labels.length>20){
labels.shift();
temps.shift();
}

chart.update();

}

loadData();

setInterval(loadData,2000);

</script>

</body>
</html>
